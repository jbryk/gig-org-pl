<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Artykuły — Panel GIG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet">
  <link rel="stylesheet" href="/admin/_admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-logo">
        <a class="logo-badge" href="dashboard.html">
          <span class="logo-icon">GIG</span>
          <span class="logo-text">Panel GIG<span>Geodezyjna Izba Gospodarcza</span></span>
        </a>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">Zarządzanie</div>
        <a href="dashboard.html"><span class="nav-icon">▦</span> Pulpit</a>
        <a href="formularze.html#newsletter"><span class="nav-icon">✉</span> Newsletter <span class="nav-badge" id="navBadgeNewsletter" style="display:none">0</span></a>
        <a href="formularze.html#kontakt"><span class="nav-icon">☎</span> Kontakt <span class="nav-badge" id="navBadgeKontakt" style="display:none">0</span></a>
        <a href="artykuly.html"><span class="nav-icon">✎</span> Artykuły</a>
        <a href="szkolenia.html"><span class="nav-icon">▤</span> Szkolenia</a>
        <div class="nav-section">Strona</div>
        <a href="/" target="_blank"><span class="nav-icon">↗</span> Zobacz stronę</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <span class="user-avatar" id="userAvatar">A</span>
          <div class="user-info"><div class="user-name" id="userName">admin</div><div class="user-role">Administrator</div></div>
          <button class="btn-logout" data-action="logout" title="Wyloguj">⏻</button>
        </div>
      </div>
    </aside>

    <div class="admin-main">
      <header class="admin-topbar">
        <div class="topbar-title">Artykuły</div>
        <div class="topbar-actions"><button class="btn btn-primary btn-sm" id="newBtn">+ Nowy artykuł</button></div>
      </header>
      <main class="admin-content">
        <div class="card"><div class="card-body">
          <div class="toolbar">
            <div class="search-box"><span class="search-icon">⌕</span>
              <input type="text" class="form-control" id="search" placeholder="Szukaj po tytule…"></div>
          </div>
          <div class="table-wrap">
            <table class="admin-table">
              <thead><tr><th>Tytuł</th><th>Kategoria</th><th>Status</th><th>Data</th><th></th></tr></thead>
              <tbody id="rows"><tr><td colspan="5" style="text-align:center;padding:24px;color:#6b7f84;">Ładowanie…</td></tr></tbody>
            </table>
          </div>
        </div></div>
      </main>
    </div>
  </div>

  <!-- MODAL edytora -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-box" style="max-width:780px;">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Nowy artykuł</div>
        <button class="modal-close" data-modal-close="editModal">×</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="aId">
        <div class="form-group"><label>Tytuł</label><input type="text" id="aTitle" class="form-control"></div>
        <div class="grid-2">
          <div class="form-group"><label>Kategoria</label>
            <select id="aCategory" class="form-control">
              <option value="aktualnosci">Aktualności</option>
              <option value="artykuly">Artykuły</option>
              <option value="biuletyn">Biuletyn</option>
            </select></div>
          <div class="form-group"><label>Status</label>
            <select id="aStatus" class="form-control">
              <option value="draft">Szkic</option>
              <option value="published">Opublikowany</option>
              <option value="archived">Zarchiwizowany</option>
            </select></div>
        </div>
        <div class="form-group"><label>Zajawka (excerpt)</label><textarea id="aExcerpt" class="form-control" rows="2"></textarea></div>
        <div class="form-group"><label>Treść</label><div id="editor" style="background:#fff;"></div></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" data-modal-close="editModal">Anuluj</button>
        <button class="btn btn-primary" id="saveBtn">Zapisz</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
  <script src="/admin/_admin.js"></script>
  <script>
    let quill, data = [];

    function slugify(s) {
      return (s||'').toLowerCase().trim()
        .replace(/ą/g,'a').replace(/ć/g,'c').replace(/ę/g,'e').replace(/ł/g,'l').replace(/ń/g,'n')
        .replace(/ó/g,'o').replace(/ś/g,'s').replace(/[żź]/g,'z')
        .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,80);
    }

    function render(filter='') {
      const f = filter.toLowerCase();
      const rows = data.filter(r => (r.title||'').toLowerCase().includes(f));
      const tb = document.getElementById('rows');
      if (!rows.length) { tb.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:24px;color:#6b7f84;">Brak artykułów.</td></tr>'; return; }
      const badge = s => s==='published'?'published':(s==='draft'?'draft':'archived');
      const label = s => s==='published'?'opublikowany':(s==='draft'?'szkic':'archiwum');
      tb.innerHTML = rows.map(r => `
        <tr>
          <td><strong>${esc(r.title||'(bez tytułu)')}</strong></td>
          <td>${esc(r.category||'—')}</td>
          <td><span class="badge badge-${badge(r.status)}">${label(r.status)}</span></td>
          <td style="white-space:nowrap;">${fmtDate(r.updated_at||r.created_at)}</td>
          <td class="actions">
            <button class="btn btn-ghost btn-xs" data-edit="${r.id}">✎ Edytuj</button>
            <button class="btn btn-danger btn-xs" data-del="${r.id}">🗑</button>
          </td>
        </tr>`).join('');
      tb.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', () => openEditor(b.dataset.edit)));
      tb.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', () => del(b.dataset.del)));
    }

    function openEditor(id) {
      const a = id ? data.find(x => x.id === id) : null;
      document.getElementById('modalTitle').textContent = a ? 'Edytuj artykuł' : 'Nowy artykuł';
      document.getElementById('aId').value = a ? a.id : '';
      document.getElementById('aTitle').value = a ? (a.title||'') : '';
      document.getElementById('aCategory').value = a ? (a.category||'aktualnosci') : 'aktualnosci';
      document.getElementById('aStatus').value = a ? (a.status||'draft') : 'draft';
      document.getElementById('aExcerpt').value = a ? (a.excerpt||'') : '';
      quill.root.innerHTML = a ? (a.content||'') : '';
      openModal('editModal');
    }

    async function save() {
      const id = document.getElementById('aId').value;
      const title = document.getElementById('aTitle').value.trim();
      if (!title) { toast('Podaj tytuł', 'error'); return; }
      const status = document.getElementById('aStatus').value;
      const rec = {
        title,
        slug: slugify(title),
        category: document.getElementById('aCategory').value,
        status,
        excerpt: document.getElementById('aExcerpt').value.trim(),
        content: quill.root.innerHTML,
        updated_at: new Date().toISOString(),
      };
      if (status === 'published') rec.published_at = new Date().toISOString();
      const btn = document.getElementById('saveBtn');
      btn.disabled = true; btn.textContent = 'Zapisywanie…';
      let res;
      if (id) res = await db.from('articles').update(rec).eq('id', id);
      else res = await db.from('articles').insert(rec);
      btn.disabled = false; btn.textContent = 'Zapisz';
      if (res.error) { console.error(res.error); toast('Błąd zapisu', 'error'); return; }
      toast('Zapisano', 'success');
      closeModal('editModal');
      load();
    }

    async function del(id) {
      if (!confirm('Usunąć ten artykuł? Tej operacji nie można cofnąć.')) return;
      const { error } = await db.from('articles').delete().eq('id', id);
      if (error) { toast('Błąd usuwania', 'error'); return; }
      toast('Usunięto', 'success'); load();
    }

    async function load() {
      const { data: d, error } = await db.from('articles').select('*').order('updated_at', { ascending: false });
      if (error) { toast('Błąd ładowania', 'error'); return; }
      data = d || [];
      render(document.getElementById('search').value);
    }

    (async () => {
      if (!await requireAuth()) return;
      quill = new Quill('#editor', { theme: 'snow',
        modules: { toolbar: [['bold','italic','underline'],[{header:[2,3,false]}],['link','blockquote'],[{list:'ordered'},{list:'bullet'}],['clean']] } });
      document.getElementById('newBtn').addEventListener('click', () => openEditor(null));
      document.getElementById('saveBtn').addEventListener('click', save);
      document.getElementById('search').addEventListener('input', e => render(e.target.value));
      load();
    })();
  </script>
</body>
</html>

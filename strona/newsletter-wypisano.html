<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Wypisano z newslettera — GIG</title>
  <style>
    body { margin:0; font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif; background:#eef4f9; color:#16314a;
      min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .box { background:#fff; border-radius:14px; box-shadow:0 10px 40px rgba(22,49,74,.12); max-width:460px; padding:40px 36px; text-align:center; }
    .ic { width:56px; height:56px; border-radius:50%; background:#e8f3ec; color:#2e7d32; display:flex; align-items:center;
      justify-content:center; font-size:28px; margin:0 auto 18px; }
    .ic.err { background:#fbeaea; color:#c62828; }
    h1 { font-size:21px; margin:0 0 10px; }
    p { color:#5b7184; font-size:15px; line-height:1.6; margin:0 0 22px; }
    a.btn { display:inline-block; background:#2f6f9f; color:#fff; text-decoration:none; padding:11px 22px; border-radius:8px; font-weight:600; font-size:14px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="ic" id="ic">✓</div>
    <h1 id="title">Zostałeś wypisany</h1>
    <p id="msg">Twój adres został usunięty z listy newslettera Geodezyjnej Izby Gospodarczej. Przykro nam, że odchodzisz.</p>
    <a class="btn" href="/">← Wróć na stronę GIG</a>
  </div>
  <script>
    var status = new URLSearchParams(location.search).get('status');
    if (status === 'error') {
      document.getElementById('ic').className = 'ic err';
      document.getElementById('ic').textContent = '!';
      document.getElementById('title').textContent = 'Coś poszło nie tak';
      document.getElementById('msg').textContent = 'Nie udało się przetworzyć wypisu. Napisz na biuro@gig.org.pl, a usuniemy Twój adres ręcznie.';
    }
  </script>
</body>
</html>
